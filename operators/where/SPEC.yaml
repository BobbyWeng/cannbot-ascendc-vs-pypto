operator_name: where
formula: "Y[i] = Condition[i] ? X1[i] : X2[i]"
category: element-wise select
inputs:
  - name: condition
    shape: "[B, 256, 384]"
    dtype: bool (uint8)
    layout: ND contiguous
  - name: x1
    shape: "[B, 256, 384]"
    dtype: float16
    layout: ND contiguous
  - name: x2
    shape: "[B, 256, 384]"
    dtype: float16
    layout: ND contiguous
outputs:
  - name: y
    shape: "[B, 256, 384]"
    dtype: float16
    layout: ND contiguous
batches: [1, 2, 4, 8, 16, 32, 64]
precision:
  rtol: 0
  atol: 0
  require_bitwise: true
  note: "Where must produce bitwise-identical output to torch.where. NaN/Inf in the non-selected branch must NOT propagate to output."
seed: 20260715

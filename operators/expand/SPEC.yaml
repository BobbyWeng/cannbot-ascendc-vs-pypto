operator_name: expand
formula: "Y[b,i,j] = X[b,i,0] (expand last dim 1->384, materialized)"
category: data-movement expand
inputs:
  - name: x
    shape: "[B, 256, 1]"
    dtype: float16
    layout: ND contiguous
outputs:
  - name: y
    shape: "[B, 256, 384]"
    dtype: float16
    layout: ND contiguous
batches: [1, 2, 4, 8, 16, 32, 64]
precision:
  rtol: 0
  atol: 0
  require_bitwise: true
  note: "Expand duplicates values - must be bitwise identical. Signed-zero exempted."
seed: 20260715

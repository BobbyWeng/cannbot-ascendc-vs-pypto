operator_name: div
formula: "Y[b,c1,c2,i,j] = X1[b,c1,c2,i,j] / X2[b,c1,c2,i,0]"
category: broadcast arithmetic
description: "Broadcast division: X2 has shape [B,3,4,256,1] broadcast along the last dim to match X1 [B,3,4,256,256]"
inputs:
  - name: x1
    logical_shape: "[B, 3, 4, 256, 256]"
    kernel_shape: "[B, 12, 256, 256]"
    dtype: float16
    layout: ND contiguous
  - name: x2
    logical_shape: "[B, 3, 4, 256, 1]"
    kernel_shape: "[B, 12, 256, 1]"
    dtype: float16
    layout: ND contiguous
outputs:
  - name: y
    logical_shape: "[B, 3, 4, 256, 256]"
    kernel_shape: "[B, 12, 256, 256]"
    dtype: float16
    layout: ND contiguous
batches: [1, 2, 4, 8, 16, 32]
optional_batches: [64]
dimension_merge: "contiguous zero-copy view: (3,4) -> 12, no actual reshape data movement"
broadcast_axis: "last dimension (index 4 logical, index 3 kernel)"
broadcast_factor: 256
precision:
  rtol: 0.001
  atol: 0.001
  require_bitwise: false
  note: "FP16 Div cannot require bitwise equality due to division rounding differences."
seed: 20260715
x1_range: [-4, 4]
x2_range_nonzero: "[-4,-0.25] ∪ [0.25,4] (no zero or near-zero in performance data)"

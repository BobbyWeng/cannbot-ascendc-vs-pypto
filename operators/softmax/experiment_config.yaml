experiment_name: "Softmax device kernel comparison — torch / Ascend C / PyPTO"
operator: softmax
shape: "[B, 256, 32]"
dtype: float16
batches: [1, 2, 4, 8, 16, 32, 64]
implementations:
  torch: {type: torch_npu.softmax, kernel_type: KERNEL_AIVEC, kernels_per_call: 1, profiler_method: single msprof session}
  ascendc: {type: "Ascend C direct <<<>>> invoke", kernel_type: KERNEL_AIVEC, kernels_per_call: 1, profiler_method: single msprof session}
  pypto: {type: "@pypto.frontend.jit", kernel_type: KERNEL_MIX_AIC, profiler_method: two-process}
benchmark: {warmup: 200, profiled_loops: 100, profiler: msprof, profiler_options: "--ascendcl=on --ai-core=on --task-time=l0"}
correctness: {rtol: 0.001, atol: 0.01, require_bitwise: false}

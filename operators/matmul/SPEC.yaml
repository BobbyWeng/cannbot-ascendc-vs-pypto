operator_name: matmul
formula: "Y[b,h,:,:] = A[b,h,:,:] @ B[b,h,:,:]"
category: cube_matmul
inputs:
  - name: A
    shape: "[B,12,256,256]"
    dtype: float16
    layout: ND contiguous
  - name: B
    shape: "[B,12,256,32]"
    dtype: float16
    layout: ND contiguous
outputs:
  - name: Y
    shape: "[B,12,256,32]"
    dtype: float16
    layout: ND contiguous
batches: [1, 2, 4, 8, 16, 32]
batch_count: 12  # heads
precision:
  rtol: 0.01
  atol: 0.01
  require_bitwise: false
  note: "FP16 MatMul with FP16 accumulation. Not bitwise vs FP32 reference. Tolerance informed by torch FP16 vs FP32 error distribution."
seed: 20260716
per_matrix:
  M: 256
  N: 32
  K: 256
total_matrices: "B × 12"
flops_per_matrix: 4194304  # 2 × M × N × K = 2 × 256 × 32 × 256
flops_per_op: "B × 12 × 4194304"
bandwidth_limited: true
cube_utilization_note: "N=32 is small; Cube utilization may be low. Consider head-fusion per core."

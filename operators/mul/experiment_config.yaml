experiment_name: "Mul device kernel comparison — torch / Ascend C / PyPTO"
operator: mul
shape: "[B, 3, 4, 256, 32]"
dtype: float16
batches: [1, 2, 4, 8, 16, 32, 64]
implementations:
  torch:
    type: torch_npu.mul / aclnnMul
    kernel_type: KERNEL_AIVEC
    kernels_per_call: 1
    profiler_method: single msprof session
  ascendc:
    type: Ascend C direct <<<>>> invoke
    kernel_type: KERNEL_AIVEC
    kernels_per_call: 1
    profiler_method: single msprof session
  pypto:
    type: "@pypto.frontend.jit"
    kernel_type: "TBD (determined by profiling)"
    kernels_per_call: "TBD"
    profiler_method: two-process (warmup no-profiler + msprof session)
benchmark:
  warmup: 200
  profiled_loops: 100
  repeat: 5
  profiler: msprof
  profiler_options: --ascendcl=on --ai-core=on --task-time=l0
correctness:
  rtol: 0
  atol: 0
  require_bitwise: true
  signed_zero_exempted: false

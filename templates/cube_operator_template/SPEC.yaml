operator_name: "{{op_name}}"
formula: "Y = A @ B"
category: cube_matmul
inputs:
  - name: A
    shape: "[batchCount, M, K]"
    dtype: float16
    layout: ND contiguous
  - name: B
    shape: "[batchCount, K, N]"
    dtype: float16
    layout: ND contiguous
outputs:
  - name: Y
    shape: "[batchCount, M, N]"
    dtype: float16
    layout: ND contiguous
batches: [1, 2, 4, 8, 16, 32, 64]
batch_count_factor: 12  # heads
precision:
  rtol: 0.01
  atol: 0.01
  require_bitwise: false
  note: "FP16 MatMul with FP16 accumulation. Not bitwise vs FP32 reference. Tolerance determined by FP32 accumulation baseline error distribution."
seed: 20260716

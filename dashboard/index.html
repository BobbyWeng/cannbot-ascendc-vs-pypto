<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Cannbot 算子对比 Dashboard</title>
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <div id="loading" class="loading">正在加载发布数据…</div>
  <div id="app" hidden>
    <header class="topbar">
      <div>
        <p class="eyebrow">ASCEND NPU · OPERATOR BENCHMARK</p>
        <h1>Cannbot 算子对比</h1>
        <p id="release-meta" class="muted"></p>
      </div>
      <div class="topbar-actions">
        <span id="source-health" class="pill"></span>
        <button id="refresh" class="button">刷新数据</button>
      </div>
    </header>

    <main class="page">
      <section id="source-alert" class="source-alert"></section>
      <section id="summary" class="summary-grid"></section>

      <section class="panel updates-panel">
        <div class="panel-heading">
          <div>
            <p class="section-kicker">本次发布</p>
            <h2>Post-RC3 关键更新</h2>
          </div>
          <button id="toggle-updates" class="text-button">收起</button>
        </div>
        <div id="updates" class="updates-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-heading table-heading">
          <div>
            <p class="section-kicker">12 个算子 · 3 条实现路线</p>
            <h2>算子总览</h2>
          </div>
          <div class="filters">
            <label class="search-wrap">
              <span>搜索</span>
              <input id="search" type="search" placeholder="算子名、状态、限制…">
            </label>
            <label>
              <span>状态</span>
              <select id="status-filter">
                <option value="all">全部</option>
                <option value="COMPLETE">完全完成</option>
                <option value="COMPLETE_WITH_LIMITATION">有限制完成</option>
              </select>
            </label>
          </div>
        </div>
        <div class="table-scroll">
          <table class="operator-table">
            <thead>
              <tr>
                <th>算子</th>
                <th>状态</th>
                <th>Torch 正确性</th>
                <th>Ascend C 正确性</th>
                <th>PyPTO 正确性</th>
                <th>B=1 主计算核</th>
                <th>证据质量</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="operator-rows"></tbody>
          </table>
        </div>
        <p id="empty-state" class="empty" hidden>没有符合筛选条件的算子。</p>
      </section>

      <section id="detail" class="panel detail-panel" hidden>
        <div class="detail-hero">
          <div>
            <button id="close-detail" class="text-button back-button">← 返回总览</button>
            <p class="section-kicker">算子详情</p>
            <div class="detail-title-row">
              <h2 id="detail-name"></h2>
              <span id="detail-status" class="status"></span>
            </div>
            <p id="detail-formula" class="formula"></p>
          </div>
          <div id="detail-warnings" class="warning-stack"></div>
        </div>

        <nav class="tabs" aria-label="详情视图">
          <button class="tab active" data-tab="overview">概览</button>
          <button class="tab" data-tab="correctness">正确性</button>
          <button class="tab" data-tab="performance">性能</button>
          <button class="tab" data-tab="evidence">数据证据</button>
          <button class="tab" data-tab="limitations">限制与更新</button>
        </nav>

        <div id="tab-overview" class="tab-panel active"></div>
        <div id="tab-correctness" class="tab-panel"></div>
        <div id="tab-performance" class="tab-panel"></div>
        <div id="tab-evidence" class="tab-panel"></div>
        <div id="tab-limitations" class="tab-panel"></div>
      </section>
    </main>
  </div>
  <script src="./dashboard.js"></script>
</body>
</html>
